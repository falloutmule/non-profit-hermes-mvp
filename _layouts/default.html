<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:52rem;margin:2rem auto;padding:0 1rem;line-height:1.55;color:#1f2937;background:#fff}
    a{color:#1d4ed8;text-decoration:none} a:hover{text-decoration:underline}
    header,footer{font-size:.95rem;color:#6b7280;margin:0 0 1.25rem}
    nav a{margin-right:1rem}
    main{padding:1rem 0}
    h1,h2,h3{line-height:1.2}
    code,pre{background:#f3f4f6;border-radius:6px}
    pre{padding:1rem;overflow:auto}
    .muted{color:#6b7280}
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/today' | relative_url }}">Today</a>
      <a href="{{ '/current-needs' | relative_url }}">Current Needs</a>
      <a href="{{ '/calendar' | relative_url }}">Calendar</a>
      <a href="{{ '/volunteer' | relative_url }}">Volunteer</a>
      <a href="{{ '/donations' | relative_url }}">Donations</a>
      <a href="{{ '/reports' | relative_url }}">Reports</a>
      <a href="{{ '/board-log' | relative_url }}">Board Log</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    Board-facing only. No private intake.
  </footer>
</body>
</html>
